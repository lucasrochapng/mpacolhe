<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MP Acolhe - Login</title>

    <link rel="stylesheet" href="css/style.css">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.1/css/all.min.css">
</head>
<body>

<div class="phone">

    <div class="status-bar">

        <span>09:41</span>

        <div class="status-icons">

            <i class="fa-solid fa-signal"></i>
            <i class="fa-solid fa-wifi"></i>
            <i class="fa-solid fa-battery-full"></i>

        </div>

    </div>

    <div class="login-page">

        <div class="login-logo">
            <i class="fa-solid fa-shield-heart"></i>
        </div>

        <h1>MP Acolhe</h1>

        <p class="subtitle">
            Comunicação e segura entre você e o Ministério Público.
        </p>

        <div class="login-content">

            <!-- ETAPA 1 -->
            <div class="login-step active" id="stepGov">

                <button id="govButton" class="gov-button">
                    <i class="fa-solid fa-id-card"></i>
                    Entrar com Gov.br
                </button>

                <p class="login-info">
                    🔒 Sua identidade será confirmada por meio da plataforma Gov.br.
                </p>

            </div>

            <!-- ETAPA 2 -->
            <div class="login-step" id="stepLogin">

                <div class="form-group">

                    <label>CPF</label>

                    <input
                        type="text"
                        id="cpf"
                        maxlength="14"
                        placeholder="000.000.000-00"
                    >

                </div>

                <div class="form-group">

                    <label style="padding-top: 30px;">Senha</label>

                    <div class="password-wrapper">

                        <input
                            type="password"
                            id="password"
                            placeholder="Digite sua senha"
                        >

                        <button
                            type="button"
                            class="toggle-password"
                            id="togglePassword">

                            <i class="fa-solid fa-eye"></i>

                        </button>

                    </div>

                </div>

                <button class="enter-button" id="enterButton" style="margin-top: 30px;">

                    Entrar

                </button>

                <div class="login-status" id="loginStatus"></div>

            </div>

        </div>

    </div>
    

</div>

<script src="js/main.js"></script>

</body>
</html>
