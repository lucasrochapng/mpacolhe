<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>MP Acolhe</title>

    <link rel="stylesheet" href="css/style.css">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.1/css/all.min.css">

</head>

<body>

<div class="phone">

    <div class="status-bar">

        <span>09:41</span>

        <div class="status-icons">

            <i class="fa-solid fa-signal"></i>
            <i class="fa-solid fa-wifi"></i>
            <i class="fa-solid fa-battery-full"></i>

        </div>

    </div>

    <div class="app-ajuda">

        <div class="page-header">

            <a href="index.html" class="back">

                <i class="fa-solid fa-arrow-left"></i>

            </a>

            <h1>Preciso de ajuda</h1>

        </div>

        <div id="helpHome">

            <h2 class="help-title">

                Como podemos ajudar você?

            </h2>

            <p class="help-subtitle" id="escolhaText">

                Escolha a opção que melhor representa o apoio que você procura neste momento.
                <button class="speak-button" data-target="escolhaText"><i class="fa-solid fa-volume-high"></i></button>

            </p>

            

            <div class="help-options">

                <button class="help-button">

                    🧠

                    <span>Preciso de atendimento psicológico</span>

                </button>

                <button class="help-button">

                    ⚖️

                    <span>Quero orientação jurídica</span>

                </button>

                <button class="help-button">

                    👶

                    <span>Há crianças precisando de apoio</span>

                </button>

                <button class="help-button">

                    🏠

                    <span>Preciso de assistência social</span>

                </button>

            </div>

        </div>

        <div id="helpResults" class="help-results">

            <button class="back-results" id="backResults">

                <i class="fa-solid fa-arrow-left"></i>

                Voltar às categorias

            </button>

            <h2 id="resultTitle"></h2>

            <p class="result-subtitle">

                Encontramos estes serviços que podem ajudar você.

            </p>

            <div id="resultCards"></div>

        </div>

    </div>

</div>

<script src="js/ajuda.js"></script>
<script src="js/leitor.js"></script>

</body>

</html>
